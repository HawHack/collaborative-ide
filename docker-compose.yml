version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: collaborative-ide-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-collab_ide}
      POSTGRES_USER: ${POSTGRES_USER:-collab_ide}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-collab_ide} -d ${POSTGRES_DB:-collab_ide}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: collaborative-ide-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"

  executor:
    build:
      context: ./executor
    container_name: collaborative-ide-executor
    restart: unless-stopped
    environment:
      EXECUTOR_PORT: ${EXECUTOR_PORT:-8010}
      EXECUTOR_SHARED_TOKEN: ${EXECUTOR_SHARED_TOKEN:-change_me_executor_token}
      EXECUTOR_TIMEOUT_SECONDS: ${EXECUTOR_TIMEOUT_SECONDS:-10}
      EXECUTOR_MAX_OUTPUT_BYTES: ${EXECUTOR_MAX_OUTPUT_BYTES:-24000}
      EXECUTOR_MEMORY_LIMIT: ${EXECUTOR_MEMORY_LIMIT:-256m}
      EXECUTOR_CPU_LIMIT: ${EXECUTOR_CPU_LIMIT:-1.0}
      EXECUTOR_PIDS_LIMIT: ${EXECUTOR_PIDS_LIMIT:-64}
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8010/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: collaborative-ide-backend
    restart: unless-stopped
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://localhost}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost}
      SQLALCHEMY_DATABASE_URI: ${SQLALCHEMY_DATABASE_URI:-postgresql+psycopg://collab_ide:change_me_postgres_password@postgres:5432/collab_ide}
      ASYNC_SQLALCHEMY_DATABASE_URI: ${ASYNC_SQLALCHEMY_DATABASE_URI:-postgresql+asyncpg://collab_ide:change_me_postgres_password@postgres:5432/collab_ide}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me_access_secret}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-change_me_refresh_secret}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      EXECUTOR_URL: ${EXECUTOR_URL:-http://executor:8010}
      EXECUTOR_SHARED_TOKEN: ${EXECUTOR_SHARED_TOKEN:-change_me_executor_token}
      COLLAB_URL: ${COLLAB_URL:-ws://localhost/ws/collab}
      COLLAB_INTERNAL_URL: ${COLLAB_INTERNAL_URL:-ws://collab:3001}
      AI_PROVIDER: ${AI_PROVIDER:-openai_compatible}
      AI_API_BASE_URL: ${AI_API_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4.1-mini}
      AI_SITE_URL: ${AI_SITE_URL:-http://localhost}
      AI_APP_NAME: ${AI_APP_NAME:-Collaborative IDE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      executor:
        condition: service_healthy
    volumes:
      - ./backend:/app
    working_dir: /app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"

  collab:
    build:
      context: ./collab
    container_name: collaborative-ide-collab
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: development
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me_access_secret}
      COLLAB_SERVER_NAME: ${COLLAB_SERVER_NAME:-collab-main}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./collab:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
    container_name: collaborative-ide-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost/api/v1
      VITE_COLLAB_WS_URL: ws://localhost/ws/collab
    depends_on:
      backend:
        condition: service_started
      collab:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173 --strictPort"
    ports:
      - "5173:5173"

  nginx:
    image: nginx:1.27-alpine
    container_name: collaborative-ide-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
      collab:
        condition: service_started
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data: